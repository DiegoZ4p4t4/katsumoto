name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libudev-dev

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Katsumoto POS ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  merge-latest-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge latest.json from all platforms
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Fetching release assets for $TAG"

          gh release download "$TAG" --pattern "latest.json" --dir ./platform-jsons || true

          if [ -f ./platform-jsons/latest.json ]; then
            echo "Only one latest.json found, checking platforms..."
            PLATFORMS=$(python3 -c "import json; d=json.load(open('./platform-jsons/latest.json')); print(len(d.get('platforms',{})))")
            echo "Platforms count: $PLATFORMS"
            if [ "$PLATFORMS" -ge 4 ]; then
              echo "All platforms present, no merge needed"
              exit 0
            fi
          fi

          echo "Downloading all latest.json files from release..."
          mkdir -p ./all-jsons
          INDEX=0
          gh release view "$TAG" --json assets --jq '.assets[] | select(.name == "latest.json") | .url' | while read URL; do
            curl -sL -H "Authorization: token $GH_TOKEN" -o "./all-jsons/latest-${INDEX}.json" "$URL"
            INDEX=$((INDEX + 1))
          done

          python3 << 'PYEOF'
          import json, glob, os

          merged = None
          for f in sorted(glob.glob("./all-jsons/latest-*.json")):
              try:
                  data = json.load(open(f))
                  if merged is None:
                      merged = data
                  else:
                      merged["platforms"].update(data.get("platforms", {}))
              except:
                  pass

          if merged:
              with open("./latest.json", "w") as out:
                  json.dump(merged, out, indent=2)
              print(f"Merged {len(merged['platforms'])} platforms")
          else:
              print("ERROR: No latest.json files found")
              exit(1)
          PYEOF

          echo "Uploading merged latest.json..."
          gh release upload "$TAG" ./latest.json --clobber
